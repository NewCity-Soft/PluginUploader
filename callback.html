<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>正在验证 - Plugin Uploader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-500 mx-auto"></div>
        <p class="mt-4 text-slate-600 font-medium">正在连接 GitHub...</p>
    </div>

    <script>
        // GitHub OAuth 回调处理
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            // 注意：纯前端无法直接交换 Client Secret，通常需要一个中转服务器（Gatekeeper）
            // 这里我们引导用户完成流程，或通过 window.opener 传回 code
            if (window.opener) {
                window.opener.postMessage({ type: 'GITHUB_AUTH_CODE', code: code }, window.location.origin);
                window.close();
            } else {
                localStorage.setItem('gh_auth_code', code);
                window.location.href = 'index.html';
            }
        } else {
            document.body.innerHTML = '<div class="text-red-500 p-8">授权失败：未收到授权码。</div>';
        }
    </script>
</body>
</html>
